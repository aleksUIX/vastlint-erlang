name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test (OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported versions
          - otp: "25.3"
            elixir: "1.14"
          # Current stable
          - otp: "27.3"
            elixir: "1.18"
          # Bleeding edge
          - otp: "28.0"
            elixir: "1.19"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # vastlint-nif Rust source lives in the vastlint monorepo.
          # We fetch it as a submodule so VASTLINT_BUILD=true works in CI.
          submodules: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: native/vastlint_nif -> target

      - name: Set up Elixir
        uses: erlef/setup-beam@5304e04ea2b355f03681464e683d92e3b2f18451  # v1.18.2
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache Mix deps
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: mix deps.get
        run: mix deps.get

      - name: Build NIF from source
        env:
          VASTLINT_BUILD: "true"
        run: mix compile

      - name: mix test (ExUnit + StreamData)
        env:
          VASTLINT_BUILD: "true"
        run: mix test --cover

      - name: Common Test suite
        env:
          VASTLINT_BUILD: "true"
        run: mix test test/vastlint_SUITE.erl || true
        # CT is run best via rebar3; mix test handles .erl via ct_run shim.
        # Failures here are informational — CT results are also checked below.

      - name: rebar3 eunit + ct
        env:
          VASTLINT_BUILD: "true"
        run: |
          # Install rebar3 if not present
          if ! command -v rebar3 &>/dev/null; then
            curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
            chmod +x /usr/local/bin/rebar3
          fi
          rebar3 eunit
          rebar3 ct
