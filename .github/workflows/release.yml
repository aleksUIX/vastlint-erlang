name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      publish_hex:
        description: "Publish to Hex.pm after building NIFs"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

# ── NIF build matrix ──────────────────────────────────────────────────────────
#
# Each entry in the matrix builds one precompiled NIF tarball and uploads it
# to the GitHub Release.  RustlerPrecompiled downloads the correct tarball at
# `mix deps.get` time on the end-user's machine - no Rust toolchain required.
#
# Tarball naming follows the RustlerPrecompiled convention:
#   vastlint_nif-v<version>-nif-<nif_version>-<target>.tar.gz
#
# Targets must exactly match the `targets:` list in lib/vastlint_nif.ex.

jobs:
  # ── 0. Create the GitHub Release (once, before NIF builds) ────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "vastlint ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            || true   # tolerate if it already exists

  # ── 1. Build precompiled NIF tarballs ──────────────────────────────────────
  build-nif:
    name: NIF ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release

    permissions:
      contents: write   # upload release assets

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon) - also cross-compiles x86_64 below
          - target: aarch64-apple-darwin
            os: macos-latest

          # macOS x86_64 (Intel) - cross-compiled from Apple Silicon runner
          - target: x86_64-apple-darwin
            os: macos-latest

          # Linux arm64 glibc (standard Ubuntu/Debian servers)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true

          # Linux x86_64 glibc
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          # NOTE: musl targets (aarch64/x86_64-unknown-linux-musl) are NOT
          # included because Rust cannot produce cdylib (shared libraries)
          # for musl targets, which is required for Erlang NIFs.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # NIF Rust source lives in the vastlint monorepo - check it out and
      # create the native/vastlint_nif symlink so VASTLINT_BUILD=true works.
      - name: Checkout vastlint monorepo (NIF source)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: aleksUIX/vastlint
          path: vastlint-monorepo

      - name: Create native/vastlint_nif symlink
        run: |
          mkdir -p native
          ln -sfn "$PWD/vastlint-monorepo/crates/vastlint-nif" native/vastlint_nif

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: vastlint-monorepo -> target
          key: nif-${{ matrix.target }}

      - name: Install cross (for cross-compiled targets)
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Set up Elixir - Linux (erlef/setup-beam)
        if: runner.os == 'Linux'
        uses: erlef/setup-beam@5304e04ea2b355f03681464e683d92e3b2f18451  # v1.18.2
        with:
          otp-version: "27.3"
          elixir-version: "1.18"

      - name: Set up Elixir - macOS (brew)
        if: runner.os == 'macOS'
        run: |
          brew update --quiet
          brew install elixir
          echo "$(brew --prefix elixir)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix erlang)/bin" >> "$GITHUB_PATH"

      # mix rustler_precompiled.download cannot find the module :vastlint_nif
      # (Erlang-atom style) because it resolves "vastlint_nif" as
      # :"Elixir.vastlint_nif". We bypass it and drive cargo/cross directly.
      - name: Build NIF (cargo / cross)
        run: |
          MANIFEST="vastlint-monorepo/crates/vastlint-nif/Cargo.toml"
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release \
              --target ${{ matrix.target }} \
              --manifest-path "$MANIFEST"
          else
            cargo build --release \
              --target ${{ matrix.target }} \
              --manifest-path "$MANIFEST"
          fi

      - name: Package NIF tarball
        run: |
          TARGET="${{ matrix.target }}"
          VERSION=$(grep '^version' vastlint-monorepo/crates/vastlint-nif/Cargo.toml \
            | head -1 | sed 's/.*"\(.*\)".*/\1/')
          NIF_VERSION=$(erl -noshell \
            -eval 'io:format("~s",[erlang:system_info(nif_version)]),halt()')

          # macOS produces a dylib; Linux produces an so.
          if [[ "$TARGET" == *"apple"* ]]; then
            ARTIFACT="vastlint-monorepo/target/${TARGET}/release/libvastlint_nif.dylib"
          else
            ARTIFACT="vastlint-monorepo/target/${TARGET}/release/libvastlint_nif.so"
          fi

          # RustlerPrecompiled naming convention:
          #   lib{crate}-v{version}-nif-{nif_version}-{target}.so.tar.gz
          # The .so extension is always used in the tarball name (even on macOS).
          # Inside the tarball the file is named libvastlint_nif.so.
          TARBALL="libvastlint_nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.so.tar.gz"
          mkdir -p /tmp/nif_pkg
          cp "$ARTIFACT" /tmp/nif_pkg/libvastlint_nif.so
          tar -czf "$TARBALL" -C /tmp/nif_pkg libvastlint_nif.so
          echo "Packaged: $TARBALL"
          echo "TARBALL_NAME=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload NIF tarball to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "$TARBALL_NAME" \
            --repo ${{ github.repository }} \
            --clobber

  # ── 2. Regenerate checksum file + publish to Hex.pm ───────────────────────
  publish-hex:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    needs: build-nif

    permissions:
      contents: write   # commit checksum file back to repo

    # Run on tag push automatically, or when manually triggered with publish=true
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_hex == true)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Compile from source so we never depend on downloading a precompiled NIF
      # (avoids nif_version mismatches between build-nif and publish runners).
      - name: Checkout vastlint monorepo (NIF source)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: aleksUIX/vastlint
          path: vastlint-monorepo

      - name: Create native/vastlint_nif symlink
        run: |
          mkdir -p native
          ln -sfn "$PWD/vastlint-monorepo/crates/vastlint-nif" native/vastlint_nif

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: vastlint-monorepo -> target
          key: publish-hex

      - name: Set up Elixir
        uses: erlef/setup-beam@5304e04ea2b355f03681464e683d92e3b2f18451  # v1.18.2
        with:
          otp-version: "27.3"
          elixir-version: "1.18"

      - name: mix deps.get
        run: mix deps.get

      # Regenerate the checksum file by downloading each tarball from the
      # GitHub Release and computing its SHA256.  We do this manually because
      # `mix rustler_precompiled.download` cannot resolve :vastlint_nif (an
      # Erlang-atom module name - no "Elixir." prefix).
      - name: Regenerate checksum file from GitHub Release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          CRATE="vastlint_nif"
          {
            echo "%{"
            gh release view "$TAG" \
              --repo ${{ github.repository }} \
              --json assets \
              --jq '.assets[].name' \
            | grep "^lib${CRATE}-.*\.so\.tar\.gz$" \
            | while read -r FILENAME; do
                URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${FILENAME}"
                SHA256=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')
                printf '  "%s" => "sha256:%s",\n' "$FILENAME" "$SHA256"
              done
            echo "}"
          } > checksum-vastlint_nif.exs
          cat checksum-vastlint_nif.exs

      - name: Commit updated checksum file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-vastlint_nif.exs
          git diff --staged --quiet || \
            git commit -m "chore: update NIF checksums for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          VASTLINT_BUILD: "true"
        run: mix hex.publish --yes
