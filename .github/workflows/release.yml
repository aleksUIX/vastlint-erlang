name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      publish_hex:
        description: "Publish to Hex.pm after building NIFs"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

# ── NIF build matrix ──────────────────────────────────────────────────────────
#
# Each entry in the matrix builds one precompiled NIF tarball and uploads it
# to the GitHub Release.  RustlerPrecompiled downloads the correct tarball at
# `mix deps.get` time on the end-user's machine — no Rust toolchain required.
#
# Tarball naming follows the RustlerPrecompiled convention:
#   vastlint_nif-v<version>-nif-<nif_version>-<target>.tar.gz
#
# Targets must exactly match the `targets:` list in lib/vastlint_nif.ex.

jobs:
  # ── 0. Create the GitHub Release (once, before NIF builds) ────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "vastlint ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            || true   # tolerate if it already exists

  # ── 1. Build precompiled NIF tarballs ──────────────────────────────────────
  build-nif:
    name: NIF ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release

    permissions:
      contents: write   # upload release assets

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-13

          # Linux arm64 glibc (standard Ubuntu/Debian servers)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true

          # Linux x86_64 glibc
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          # Linux arm64 musl (Alpine, static binaries)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true

          # Linux x86_64 musl
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: native/vastlint_nif -> target
          key: nif-${{ matrix.target }}

      - name: Install cross (for cross-compiled targets)
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Set up Elixir (latest stable)
        uses: erlef/setup-beam@5304e04ea2b355f03681464e683d92e3b2f18451  # v1.18.2
        with:
          otp-version: "27.3"
          elixir-version: "1.18"

      - name: mix deps.get
        run: mix deps.get

      - name: Build precompiled NIF tarball
        env:
          VASTLINT_BUILD: "true"
          MIX_ENV: prod
        run: |
          mix rustler_precompiled.download vastlint_nif \
            --only-local \
            --target ${{ matrix.target }} \
            ${{ matrix.use-cross && '--use-cross' || '' }}

      # RustlerPrecompiled writes tarballs to checksum dir; find and upload.
      - name: Upload NIF tarball to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            priv/precompiled/vastlint_nif-*.tar.gz \
            --repo ${{ github.repository }} \
            --clobber

  # ── 2. Regenerate checksum file + publish to Hex.pm ───────────────────────
  publish-hex:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    needs: build-nif

    permissions:
      contents: write   # commit checksum file back to repo

    # Run on tag push automatically, or when manually triggered with publish=true
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_hex == true)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Elixir
        uses: erlef/setup-beam@5304e04ea2b355f03681464e683d92e3b2f18451  # v1.18.2
        with:
          otp-version: "27.3"
          elixir-version: "1.18"

      - name: mix deps.get
        run: mix deps.get

      - name: Download all precompiled NIF tarballs + regenerate checksum file
        env:
          # Points at the just-created GitHub Release so tarballs resolve.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mix rustler_precompiled.download vastlint_nif --all --print \
            > checksum-vastlint_nif.exs

      - name: Commit updated checksum file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksum-vastlint_nif.exs
          git diff --staged --quiet || \
            git commit -m "chore: update NIF checksums for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
